<svg xmlns="http://www.w3.org/2000/svg" viewBox="13 8 30 40">
  <defs>
    <style>
      .lens-dot {
        animation: lensPulse 2s ease-in-out infinite;
        transform-origin: 26px 22px;
      }
      .lens-shine {
        animation: shinePulse 2s ease-in-out infinite;
      }
      @keyframes lensPulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.45); }
      }
      @keyframes shinePulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Structural ring & stand -->
  <circle cx="26" cy="22" r="12" stroke="#0B2444" stroke-width="4.5" fill="none"/>
  <path d="M34.5 13.5 A12 12 0 0 1 38 22" stroke="#1A8C7A" stroke-width="4.5" stroke-linecap="round"/>
  
  <!-- 🟢 Pulsing Green Specimen Node & Shine -->
  <circle class="lens-dot" cx="26" cy="22" r="4.5" fill="#22B89F"/>
  <circle class="lens-shine" cx="21.5" cy="17.5" r="1.5" fill="#1A8C7A" opacity="0.5"/>
  
  <!-- Base foundation -->
  <line x1="26" y1="34" x2="26" y2="43" stroke="#0B2444" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="16" y1="43" x2="36" y2="43" stroke="#0B2444" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="18.5" y1="43" x2="18.5" y2="47" stroke="#0B2444" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="33.5" y1="43" x2="33.5" y2="47" stroke="#0B2444" stroke-width="3.5" stroke-linecap="round"/>
</svg>
